<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Firebase Admin x User</title>
</head>
<body>
  <h2>Cadastro</h2>
  <input id="name" placeholder="Nome"><br>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Senha"><br>

  <select id="role">
    <option value="user">User</option>
    <option value="admin">Admin</option>
  </select><br>

  <button onclick="register()">Cadastrar</button>

  <hr>

  <h2>Login</h2>
  <input id="loginEmail" placeholder="Email"><br>
  <input id="loginPassword" type="password" placeholder="Senha"><br>

  <button onclick="login()">Entrar</button>

  <hr>

  <h2>Dashboard</h2>
  <div id="content"></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
